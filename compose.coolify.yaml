services:
  migrate:
    build:
      context: ./backend
    environment: &backend-environment
      DATABASE_URL: ${DATABASE_URL:?Supabase pooler DATABASE_URL is required}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      SESSION_IDLE_MINUTES: ${SESSION_IDLE_MINUTES:-30}
      SESSION_ABSOLUTE_HOURS: ${SESSION_ABSOLUTE_HOURS:-12}
      # Blank keeps the stronger host-only __Host-session cookie at the Coolify-managed domain.
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      CORS_ORIGINS: "[]"
      CSRF_COOKIE_NAME: ${CSRF_COOKIE_NAME:-csrf_token}
      ENV: production
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  seed:
    build:
      context: ./backend
    environment: *backend-environment
    command: ["python", "-m", "app.seed"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    profiles: ["seed"]
    restart: "no"

  backend:
    build:
      context: ./backend
    environment: *backend-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2)",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: coolify-gateway
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
